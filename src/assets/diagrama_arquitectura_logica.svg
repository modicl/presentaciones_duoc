<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="820" viewBox="0 0 1180 820" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#5a6b7b"/>
    </marker>
    <marker id="arrowB" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#1F4E79"/>
    </marker>
    <marker id="arrowR" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#cf7b72"/>
    </marker>
    <style>
      .title{font-size:24px;font-weight:700;fill:#1F4E79}
      .sub{font-size:12px;fill:#5a6b7b}
      .layer{font-size:13px;font-weight:700;fill:#1F4E79;letter-spacing:.5px}
      .box{font-size:15px;font-weight:600;fill:#1b2733}
      .small{font-size:11px;fill:#5a6b7b}
      .tag{font-size:11px;font-weight:600;fill:#1F4E79}
      .white{fill:#ffffff;font-weight:600}
    </style>
  </defs>

  <rect width="1180" height="820" fill="#ffffff"/>
  <text x="40" y="44" class="title">Arquitectura de la aplicación — Innovatech Chile</text>
  <text x="40" y="64" class="sub">Vista lógica de componentes y capas · 3 microservicios contenedorizados · API gateway por path (ALB) · CI/CD GitHub Actions</text>

  <!-- ============ LAYER LABELS (left rail) ============ -->
  <text x="20" y="150" class="layer" transform="rotate(-90 20 150)" text-anchor="middle">CLIENTE</text>
  <text x="20" y="285" class="layer" transform="rotate(-90 20 285)" text-anchor="middle">ENRUTAMIENTO</text>
  <text x="20" y="470" class="layer" transform="rotate(-90 20 470)" text-anchor="middle">APLICACIÓN</text>
  <text x="20" y="660" class="layer" transform="rotate(-90 20 660)" text-anchor="middle">DATOS</text>

  <!-- ============ CLIENT TIER ============ -->
  <rect x="45" y="95" width="820" height="100" rx="10" fill="#f5f9fd" stroke="#9db8d6"/>
  <rect x="90" y="120" width="200" height="55" rx="8" fill="#eef3f9" stroke="#9db8d6"/>
  <text x="190" y="143" text-anchor="middle" class="box">Navegador del usuario</text>
  <text x="190" y="162" text-anchor="middle" class="small">HTML + CSS + script.js (estático)</text>

  <text x="320" y="135" class="small">El navegador descarga el sitio estático y luego</text>
  <text x="320" y="151" class="small">consume los backends vía fetch() al mismo origen</text>
  <text x="320" y="167" class="small">(http://&lt;DNS-ALB&gt;) → sin CORS, sin puertos.</text>

  <!-- ============ ROUTING TIER (ALB / API gateway) ============ -->
  <rect x="45" y="220" width="820" height="125" rx="10" fill="#e7f0e7" stroke="#6fa86f"/>
  <text x="70" y="245" class="box">Application Load Balancer — listener HTTP:80 (punto de entrada único)</text>
  <text x="70" y="263" class="small">DNS: alb-ep3-1275216882.us-east-1.elb.amazonaws.com · actúa como API gateway / reverse proxy enrutando por ruta</text>

  <rect x="70" y="280" width="240" height="48" rx="6" fill="#ffffff" stroke="#6fa86f"/>
  <text x="190" y="299" text-anchor="middle" class="box" font-size="13">Default (resto)</text>
  <text x="190" y="318" text-anchor="middle" class="small">→ tg-front</text>

  <rect x="325" y="280" width="240" height="48" rx="6" fill="#ffffff" stroke="#6fa86f"/>
  <text x="445" y="299" text-anchor="middle" class="box" font-size="13">Regla 1 · /api/users*</text>
  <text x="445" y="318" text-anchor="middle" class="small">→ tg-backjs</text>

  <rect x="580" y="280" width="265" height="48" rx="6" fill="#ffffff" stroke="#6fa86f"/>
  <text x="712" y="299" text-anchor="middle" class="box" font-size="13">Regla 2 · /api/products*</text>
  <text x="712" y="318" text-anchor="middle" class="small">→ tg-backpy</text>

  <!-- client -> ALB -->
  <line x1="190" y1="175" x2="190" y2="218" stroke="#5a6b7b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="200" y="208" class="small">HTTP</text>

  <!-- ============ APPLICATION TIER (microservices) ============ -->
  <rect x="45" y="375" width="820" height="200" rx="10" fill="#f5f9fd" stroke="#9db8d6"/>
  <text x="70" y="400" class="box">Microservicios en contenedores — Amazon ECS (Fargate)</text>

  <!-- Frontend service -->
  <rect x="70" y="415" width="240" height="145" rx="8" fill="#ffffff" stroke="#6fa86f"/>
  <text x="190" y="440" text-anchor="middle" class="box">Frontend</text>
  <text x="190" y="459" text-anchor="middle" class="small">Nginx sirve sitio estático</text>
  <text x="190" y="475" text-anchor="middle" class="small">generado con Java/Maven</text>
  <text x="190" y="491" text-anchor="middle" class="tag">puerto :80 · /health</text>
  <text x="190" y="512" text-anchor="middle" class="small">URLs de backend inyectadas</text>
  <text x="190" y="528" text-anchor="middle" class="small">en runtime (entrypoint + env)</text>
  <rect x="135" y="538" width="110" height="18" rx="9" fill="#e0a060"/>
  <text x="190" y="551" text-anchor="middle" class="white" font-size="10">img: devops-ep3-front</text>

  <!-- Backend JS -->
  <rect x="325" y="415" width="240" height="145" rx="8" fill="#ffffff" stroke="#6fa86f"/>
  <text x="445" y="440" text-anchor="middle" class="box">Servicio Usuarios</text>
  <text x="445" y="459" text-anchor="middle" class="small">Node.js 18 + Express</text>
  <text x="445" y="475" text-anchor="middle" class="tag">puerto :8081</text>
  <text x="445" y="496" text-anchor="middle" class="small">API REST /api/users</text>
  <text x="445" y="512" text-anchor="middle" class="small">registro / login de usuarios</text>
  <rect x="382" y="538" width="126" height="18" rx="9" fill="#e0a060"/>
  <text x="445" y="551" text-anchor="middle" class="white" font-size="10">img: devops-ep3-backjs</text>

  <!-- Backend Python -->
  <rect x="580" y="415" width="265" height="145" rx="8" fill="#ffffff" stroke="#6fa86f"/>
  <text x="712" y="440" text-anchor="middle" class="box">Servicio Productos</text>
  <text x="712" y="459" text-anchor="middle" class="small">Python + Flask</text>
  <text x="712" y="475" text-anchor="middle" class="tag">puerto :8082</text>
  <text x="712" y="496" text-anchor="middle" class="small">API REST /api/products</text>
  <text x="712" y="512" text-anchor="middle" class="small">catálogo de productos</text>
  <rect x="646" y="538" width="132" height="18" rx="9" fill="#e0a060"/>
  <text x="712" y="551" text-anchor="middle" class="white" font-size="10">img: devops-ep3-backpy</text>

  <!-- ALB -> services -->
  <line x1="712" y1="328" x2="712" y2="413" stroke="#1F4E79" stroke-width="2" marker-end="url(#arrowB)"/>
  <line x1="445" y1="328" x2="445" y2="413" stroke="#1F4E79" stroke-width="2" marker-end="url(#arrowB)"/>
  <line x1="190" y1="328" x2="190" y2="413" stroke="#1F4E79" stroke-width="2" marker-end="url(#arrowB)"/>

  <!-- ============ DATA TIER ============ -->
  <rect x="45" y="605" width="820" height="120" rx="10" fill="#fde9e7" stroke="#cf7b72"/>
  <text x="70" y="630" class="box">Capa de datos — EC2 (Amazon Linux 2023) con MariaDB · :3306</text>

  <rect x="325" y="645" width="240" height="60" rx="8" fill="#ffffff" stroke="#cf7b72"/>
  <text x="445" y="670" text-anchor="middle" class="box" font-size="14">users_db</text>
  <text x="445" y="690" text-anchor="middle" class="small">usuarios</text>

  <rect x="580" y="645" width="265" height="60" rx="8" fill="#ffffff" stroke="#cf7b72"/>
  <text x="712" y="670" text-anchor="middle" class="box" font-size="14">products_db</text>
  <text x="712" y="690" text-anchor="middle" class="small">productos · utf8mb4 (emojis)</text>

  <!-- services -> DB -->
  <line x1="445" y1="560" x2="445" y2="643" stroke="#cf7b72" stroke-width="2" marker-end="url(#arrowR)"/>
  <line x1="712" y1="560" x2="712" y2="643" stroke="#cf7b72" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="455" y="600" class="small">SQL :3306</text>

  <!-- ============ CROSS-CUTTING: CI/CD (right column top) ============ -->
  <rect x="895" y="95" width="255" height="250" rx="10" fill="#eef1f4" stroke="#9db8d6"/>
  <text x="912" y="120" class="layer">CI/CD (DevOps)</text>

  <rect x="915" y="135" width="215" height="46" rx="6" fill="#eef3f9" stroke="#9db8d6"/>
  <text x="1022" y="154" text-anchor="middle" class="box" font-size="13">Desarrollador</text>
  <text x="1022" y="171" text-anchor="middle" class="small">git push (main / aws)</text>

  <rect x="915" y="195" width="215" height="46" rx="6" fill="#2b3a4a" stroke="#1b2733"/>
  <text x="1022" y="214" text-anchor="middle" class="white" font-size="13">GitHub Actions</text>
  <text x="1022" y="231" text-anchor="middle" fill="#c7d2dd" font-size="11">build → tag → push</text>

  <rect x="915" y="255" width="215" height="46" rx="6" fill="#fff3e6" stroke="#e0a060"/>
  <text x="1022" y="274" text-anchor="middle" class="box" font-size="13">Amazon ECR</text>
  <text x="1022" y="291" text-anchor="middle" class="small">imágenes :sha / :latest</text>

  <line x1="1022" y1="181" x2="1022" y2="193" stroke="#5a6b7b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1022" y1="241" x2="1022" y2="253" stroke="#5a6b7b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="912" y="324" class="small">ECS hace pull de las imágenes</text>
  <line x1="912" y1="332" x2="865" y2="430" stroke="#e0a060" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>

  <!-- ============ CROSS-CUTTING: OBSERVABILITY (right column bottom) ============ -->
  <rect x="895" y="375" width="255" height="200" rx="10" fill="#f0e8f7" stroke="#a07cc0"/>
  <text x="912" y="400" class="layer" fill="#7a4fa0">OBSERVABILIDAD</text>
  <rect x="915" y="415" width="215" height="70" rx="6" fill="#ffffff" stroke="#a07cc0"/>
  <text x="1022" y="442" text-anchor="middle" class="box">Amazon CloudWatch</text>
  <text x="1022" y="461" text-anchor="middle" class="small">logs /ecs/devops-*</text>
  <text x="1022" y="477" text-anchor="middle" class="small">métricas CPU/mem · ALB</text>

  <rect x="915" y="500" width="215" height="60" rx="6" fill="#fdf6e3" stroke="#d8b24a"/>
  <text x="1022" y="525" text-anchor="middle" class="box" font-size="14">Auto Scaling</text>
  <text x="1022" y="544" text-anchor="middle" class="small">Target Tracking · CPU 50%</text>

  <line x1="893" y1="475" x2="847" y2="475" stroke="#a07cc0" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="848" y="468" class="small">logs/métricas de los 3 servicios</text>

  <!-- ============ FOOTER ============ -->
  <text x="45" y="775" class="small">Patrón: microservicios desacoplados por dominio (usuarios / productos), contenedorizados e independientes, con un único punto de entrada público (ALB).</text>
  <text x="45" y="793" class="small">El front es estático y consume las APIs desde el navegador; ambos backends comparten la instancia MariaDB pero con bases de datos separadas por servicio.</text>
</svg>
